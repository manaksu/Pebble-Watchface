<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Literary Settings</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0d0d0d;color:#fff;padding:20px 16px 48px}
h1{font-size:20px;font-weight:300;margin:0 0 4px}
.sub{font-size:12px;color:#555;margin:0 0 24px}
h2{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin:24px 0 8px}
label{display:flex;align-items:center;gap:12px;background:#1a1a1a;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;font-size:15px}
input[type=radio]{accent-color:#e02020;width:20px;height:20px;flex-shrink:0}
.swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0}
button{width:100%;padding:15px;background:#e02020;color:#fff;border:0;border-radius:8px;font-size:16px;margin-top:28px;cursor:pointer}
</style>
</head>
<body>
<h1>Literary</h1>
<p class="sub">Watchface settings</p>

<h2>Widget</h2>
<label><input type="radio" name="w" value="0"> Sine Wave</label>
<label><input type="radio" name="w" value="1"> Bar Chart</label>
<label><input type="radio" name="w" value="2"> Battery Line</label>
<label><input type="radio" name="w" value="3"> Dot ECG</label>

<h2>Font</h2>
<label><input type="radio" name="f" value="0"> Compact — Gothic 09</label>
<label><input type="radio" name="f" value="1"> Standard — Gothic 14</label>
<label><input type="radio" name="f" value="2"> Bold — Gothic 18</label>
<label><input type="radio" name="f" value="3"> Large — Gothic 28</label>

<h2>Text Style</h2>
<label><input type="radio" name="s" value="0"> ALL CAPS</label>
<label><input type="radio" name="s" value="1"> Mixed Case</label>
<label><input type="radio" name="s" value="2"> all lower</label>
<label><input type="radio" name="s" value="3"> BRIGHT UPPER / dim lower</label>

<h2>Text Colour</h2>
<label><input type="radio" name="c" value="0"><span class="swatch" style="background:#ffffff;border:1px solid #444"></span> Pure White</label>
<label><input type="radio" name="c" value="1"><span class="swatch" style="background:#e8e0d0"></span> Warm White</label>
<label><input type="radio" name="c" value="2"><span class="swatch" style="background:#d4b896"></span> Soft Amber</label>
<label><input type="radio" name="c" value="3"><span class="swatch" style="background:#c8d0d8"></span> Cool Gray</label>
<label><input type="radio" name="c" value="4"><span class="swatch" style="background:#c8d8c0"></span> Pale Green</label>

<button onclick="save()">Save</button>

<script>
(function() {
  var p = {};
  location.search.replace(/[?&]([^=&]+)=([^&]*)/g, function(_, k, v) { p[k]=v; });
  ['w','f','s','c'].forEach(function(n) {
    if (p[n]) {
      var el = document.querySelector('input[name="'+n+'"][value="'+p[n]+'"]');
      if (el) el.checked = true;
    }
  });
  /* defaults if nothing saved */
  if (!document.querySelector('input[name="w"]:checked')) document.querySelector('input[name="w"][value="3"]').checked=true;
  if (!document.querySelector('input[name="f"]:checked')) document.querySelector('input[name="f"][value="1"]').checked=true;
  if (!document.querySelector('input[name="s"]:checked')) document.querySelector('input[name="s"][value="0"]').checked=true;
  if (!document.querySelector('input[name="c"]:checked')) document.querySelector('input[name="c"][value="1"]').checked=true;
})();

function save() {
  var w = document.querySelector('input[name="w"]:checked').value;
  var f = document.querySelector('input[name="f"]:checked').value;
  var s = document.querySelector('input[name="s"]:checked').value;
  var c = document.querySelector('input[name="c"]:checked').value;
  location.href = 'pebblejs://close#' + encodeURIComponent(
    JSON.stringify({widget:+w, font:+f, style:+s, colour:+c})
  );
}
</script>
</body>
</html>
